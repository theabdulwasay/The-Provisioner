<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Log in — The Provisioner</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<header class="site-header">
  <div class="container bar">
    <a href="index.html" class="brand">The Provisioner<small>Everyday Goods Co.</small></a>
    <nav class="nav-links" id="nav-links"></nav>
  </div>
</header>

<div class="form-card">
  <h2>Welcome back</h2>
  <form id="login-form">
    <div class="field"><label>Email</label><input type="email" id="email" required value="jane@example.com"/></div>
    <div class="field"><label>Password</label><input type="password" id="password" required value="password123"/></div>
    <button class="btn btn-brass btn-block" type="submit">Log in</button>
    <div id="error" class="error-text"></div>
  </form>
  <p class="helper-text">No account? <a href="register.html" style="color:var(--brass-dark);font-weight:600;">Sign up</a></p>
  <p class="helper-text" style="font-size:12px;">Demo admin: admin@shop.com / admin123</p>
</div>

<script src="js/api.js"></script>
<script src="js/cart.js"></script>
<script src="js/auth.js"></script>
<script>
  renderNav();
  document.getElementById("login-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    document.getElementById("error").textContent = "";
    try {
      const { token, user } = await apiFetch("/auth/login", {
        method: "POST",
        body: JSON.stringify({
          email: document.getElementById("email").value,
          password: document.getElementById("password").value,
        }),
      });
      localStorage.setItem("token", token);
      localStorage.setItem("user", JSON.stringify(user));
      window.location.href = "index.html";
    } catch (err) {
      document.getElementById("error").textContent = err.message;
    }
  });
</script>
</body>
</html>
