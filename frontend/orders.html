<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Orders — The Provisioner</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<header class="site-header">
  <div class="container bar">
    <a href="index.html" class="brand">The Provisioner<small>Everyday Goods Co.</small></a>
    <nav class="nav-links" id="nav-links"></nav>
  </div>
</header>

<div class="container" style="padding:48px 24px; min-height: 70vh; max-width: 900px;">
  <h1 style="font-family: var(--font-display); margin-bottom: 24px;">My Orders</h1>
  <div id="orders-list">Loading orders...</div>
</div>

<footer>
  <div class="container">
    &copy; 2026 The Provisioner. Designed and developed as a complete full-stack portfolio e-commerce application.
  </div>
</footer>

<script src="js/api.js"></script>
<script src="js/cart.js"></script>
<script src="js/auth.js"></script>
<script>
  if (!isLoggedIn()) { window.location.href = "login.html"; }
  renderNav();
  
  const orderDetailsCache = {};

  async function toggleOrder(orderId) {
    const detailsDiv = document.getElementById(`details-${orderId}`);
    if (!detailsDiv) return;

    const isOpen = detailsDiv.classList.contains("open");
    
    // Close all other details
    document.querySelectorAll(".order-details").forEach(el => el.classList.remove("open"));

    if (!isOpen) {
      detailsDiv.classList.add("open");
      if (!orderDetailsCache[orderId]) {
        detailsDiv.innerHTML = `<div style="text-align: center; padding: 20px; color: var(--text-muted);">Loading details...</div>`;
        try {
          const { order, items } = await apiFetch(`/orders/${orderId}`);
          orderDetailsCache[orderId] = { order, items };
          renderOrderDetails(orderId);
        } catch (err) {
          detailsDiv.innerHTML = `<div class="error-text">Failed to load order details: ${err.message}</div>`;
        }
      } else {
        renderOrderDetails(orderId);
      }
    }
  }

  function renderOrderDetails(orderId) {
    const detailsDiv = document.getElementById(`details-${orderId}`);
    const { order, items } = orderDetailsCache[orderId];

    // Build tracker
    const steps = ["pending", "paid", "shipped", "delivered"];
    const activeIdx = steps.indexOf(order.status);
    let trackerHtml = "";

    if (order.status === "cancelled") {
      trackerHtml = `<div style="background: var(--error-light); color: var(--error); padding: 12px; border-radius: var(--radius-md); font-weight: 600; margin-bottom: 20px; text-align: center;">This order has been cancelled.</div>`;
    } else {
      trackerHtml = `
        <div class="order-tracker">
          ${steps.map((step, idx) => {
            let stateClass = "";
            if (idx < activeIdx) stateClass = "completed";
            else if (idx === activeIdx) stateClass = "active";
            return `
              <div class="tracker-step ${stateClass}">
                <div class="tracker-bullet">${idx < activeIdx ? '✓' : idx + 1}</div>
                <div class="tracker-label">${step}</div>
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

    const subtotal = items.reduce((acc, item) => acc + item.unit_price * item.quantity, 0);

    detailsDiv.innerHTML = `
      ${trackerHtml}
      
      <h4 style="font-family: var(--font-display); margin-bottom: 12px;">Items Purchased</h4>
      <div class="table-responsive" style="margin-bottom: 20px; border-radius: var(--radius-md);">
        <table>
          <thead>
            <tr>
              <th>Item</th>
              <th>Unit Price</th>
              <th>Quantity</th>
              <th>Subtotal</th>
            </tr>
          </thead>
          <tbody>
            ${items.map(item => `
              <tr>
                <td>${item.product_name}</td>
                <td>${money(item.unit_price)}</td>
                <td>${item.quantity}</td>
                <td>${money(item.unit_price * item.quantity)}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      </div>

      <div style="display:grid; grid-template-columns: 1fr 280px; gap: 20px; align-items: start;">
        <div style="font-size: 13px; color: var(--text-muted);">
          <strong>Shipping Details:</strong><br/>
          ${order.shipping_address || "No address details specified."}
        </div>
        <div style="font-size: 14px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 16px;">
          <div style="display:flex; justify-content:space-between; margin-bottom: 8px;">
            <span>Subtotal:</span>
            <span>${money(subtotal)}</span>
          </div>
          ${order.coupon_code ? `
            <div style="display:flex; justify-content:space-between; margin-bottom: 8px; color: var(--success);">
              <span>Promo (${order.coupon_code}):</span>
              <span>-${money(order.discount_applied)}</span>
            </div>
          ` : ''}
          <div style="display:flex; justify-content:space-between; font-weight: 700; border-top: 1px solid var(--border); padding-top: 8px;">
            <span>Total Paid:</span>
            <span>${money(order.total)}</span>
          </div>
        </div>
      </div>
    `;
  }

  if (requireLogin()) {
    (async () => {
      try {
        const { orders } = await apiFetch("/orders");
        const list = document.getElementById("orders-list");
        if (!orders.length) {
          list.innerHTML = `<div class="empty-state"><h3>No orders yet</h3><p>Your orders will show up here after checkout.</p><a href="index.html" class="btn" style="margin-top: 16px;">Browse goods</a></div>`;
          return;
        }
        list.innerHTML = orders.map(o => `
          <div class="order-card">
            <div class="order-header" onclick="toggleOrder(${o.id})">
              <div class="order-header-cell">
                <div class="label">Order ID</div>
                <div class="value">#${o.id}</div>
              </div>
              <div class="order-header-cell">
                <div class="label">Date Placed</div>
                <div class="value">${new Date(o.created_at).toLocaleDateString()}</div>
              </div>
              <div class="order-header-cell">
                <div class="label">Order Status</div>
                <div class="value"><span class="status-pill status-${o.status}">${o.status}</span></div>
              </div>
              <div class="order-header-cell">
                <div class="label">Total Paid</div>
                <div class="value">${money(o.total)}</div>
              </div>
            </div>
            <div id="details-${o.id}" class="order-details"></div>
          </div>
        `).join("");
      } catch (err) {
        document.getElementById("orders-list").innerHTML = `<div class="empty-state"><h3>Error loading history</h3><p>${err.message}</p></div>`;
      }
    })();
  }
</script>
</body>
</html>
